<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYC FloodNet — Live Flood Predictions</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI',Arial,sans-serif; background:#0B1723; color:#E8EFF7; }
  #app { max-width:1200px; margin:0 auto; padding:22px 16px 32px; }
  h1   { font-size:20px; font-weight:700; color:#4db8ff; margin-bottom:4px; }
  #sub { font-size:12px; color:#7AADC6; margin-bottom:20px; }
  #map-img { width:100%; border:1px solid #1A3550; border-radius:6px; }
  #stats   { display:flex; flex-wrap:wrap; gap:12px; margin-top:20px; }
  .card    { flex:1 1 160px; background:#162D44; border-radius:6px; padding:14px 16px; }
  .card h3 { font-size:12px; color:#7AADC6; margin-bottom:6px; text-transform:uppercase; letter-spacing:.5px; }
  .card .val { font-size:22px; font-weight:700; color:#4db8ff; }
  .card .lbl { font-size:11px; color:#3E5870; margin-top:3px; }
  #weather { margin-top:20px; }
  #weather h2 { font-size:14px; color:#7AADC6; margin-bottom:10px; }
  table  { width:100%; border-collapse:collapse; font-size:12px; }
  th, td { padding:7px 10px; text-align:left; border-bottom:1px solid #1A3550; }
  th     { color:#7AADC6; font-weight:600; }
  td     { color:#E8EFF7; }
  #footer { margin-top:24px; font-size:11px; color:#3E5870; text-align:center; }
  .cat-0 { color:#93cfee; } .cat-1 { color:#4db8ff; }
  .cat-2 { color:#0066cc; } .cat-3 { color:#6600ff; }
</style>
</head>
<body>
<div id="app">
  <h1>NYC FloodNet — Live Flood Predictions</h1>
  <div id="sub">Powered by GFS weather · MMBTWithTabPFNLegacy model · Updates 4×/day</div>
  <img id="map-img" src="data/flood_prediction.png" alt="Flood prediction map">

  <div id="stats" style="display:none"></div>
  <div id="weather" style="display:none"><h2>Current Weather at Key Locations</h2><table id="wtbl"><thead><tr><th>Location</th><th>Precip 24h (mm)</th><th>Temp (°C)</th><th>Max Wind (m/s)</th></tr></thead><tbody id="wtbody"></tbody></table></div>
  <div id="footer">Last updated: <span id="ts">—</span></div>
</div>
<script>
const CAT_LABELS = {'-1':'—','0':'Minimal','1':'Minor','2':'Moderate','3':'Major'};
const CAT_CLASS  = {'-1':'','0':'cat-0','1':'cat-1','2':'cat-2','3':'cat-3'};

async function load() {
  try {
    const r = await fetch('data/latest.json?t=' + Date.now());
    const d = await r.json();

    document.getElementById('ts').textContent = d.timestamp_utc
      ? new Date(d.timestamp_utc).toLocaleString('en-US', {timeZone:'UTC'}) + ' UTC' : '—';

    const stats = d.borough_stats || {};
    const wrap  = document.getElementById('stats');
    wrap.style.display = 'flex';
    wrap.innerHTML = Object.entries(stats).map(([name, s]) => `
      <div class="card">
        <h3>${name}</h3>
        <div class="val ${CAT_CLASS[s.dominant_cat]}">${CAT_LABELS[s.dominant_cat]}</div>
        <div class="lbl">${s.pct_flooded?.toFixed(1) ?? 0}% flooded · max ${s.max_depth_m?.toFixed(2) ?? 0} m</div>
      </div>`).join('');

    const wx = d.weather_summary || {};
    if (Object.keys(wx).length > 0) {
      document.getElementById('weather').style.display = 'block';
      document.getElementById('wtbody').innerHTML = Object.entries(wx).map(([loc, w]) =>
        `<tr><td>${loc}</td><td>${w.precip_24h_mm}</td><td>${w.temp_c_mean}</td><td>${w.wind_ms_max}</td></tr>`
      ).join('');
    }
  } catch(e) {
    console.warn('Could not load latest.json:', e);
  }
}

load();
// Refresh every 10 minutes
setInterval(() => { document.getElementById('map-img').src = 'data/flood_prediction.png?t=' + Date.now(); load(); }, 600000);
</script>
</body>
</html>
